<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Opción A · Barra inferior — I&amp;I Realty (vista previa)</title>
<style>
  /* ===================================================================
     PROTOTIPO DE DISEÑO — OPCIÓN A: BARRA INFERIOR TIPO APP
     Self-contained. No depende de CDNs. No es la app real.
     Sistema de diseño compartido por las 3 opciones.
     =================================================================== */
  :root{
    --bg:#eef2f6; --surface:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e6ebf1;
    --brand:#0f766e; --brand-600:#0d9488; --brand-700:#0f766e; --brand-900:#0f3b38; --brand-tint:#effbf8;
    --ok:#059669; --ok-tint:#ecfdf5; --warn:#b45309; --warn-tint:#fff7ed;
    --pend:#be123c; --pend-tint:#fff1f3; --idle:#64748b; --idle-tint:#f1f5f9;
    --radius:18px; --radius-sm:12px;
    --shadow:0 1px 2px rgba(15,23,42,.05), 0 12px 30px -16px rgba(15,23,42,.25);
    --shadow-bar:0 -6px 24px -12px rgba(15,23,42,.35);
    --bar-h:66px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    max-width:480px; margin:0 auto; min-height:100vh; position:relative;
  }
  h1,h2,h3,p{margin:0}
  button{font-family:inherit}

  /* Cinta de "esto es una vista previa" */
  .ribbon{
    background:linear-gradient(90deg,#0f3b38,#0f766e);
    color:#d1faf3; font-size:12px; font-weight:600; letter-spacing:.02em;
    padding:7px 16px; display:flex; align-items:center; gap:8px;
  }
  .ribbon b{color:#fff}
  .ribbon .dot{width:7px;height:7px;border-radius:50%;background:#5eead4;flex:none}

  /* App bar superior */
  .appbar{
    position:sticky; top:0; z-index:40;
    background:var(--surface); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px; padding:12px 16px;
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;color:var(--brand-900)}
  .brand .mark{width:30px;height:30px;border-radius:9px;background:var(--brand-700);color:#fff;display:grid;place-items:center;font-size:16px}
  .appbar .spacer{flex:1}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--brand-tint);color:var(--brand-700);
    display:grid;place-items:center;font-weight:700;border:1px solid #cdeee8}

  /* Contenido */
  main{padding:16px 16px calc(var(--bar-h) + 26px + env(safe-area-inset-bottom)); }
  .screen{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* Hero */
  .hero{
    background:radial-gradient(120% 140% at 0% 0%, #15827a 0%, #0f766e 45%, #0f3b38 100%);
    color:#eafffb; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); margin-bottom:18px;
  }
  .hero .eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9fe9dd}
  .hero h1{font-size:22px;line-height:1.2;margin:6px 0 8px;font-weight:800}
  .hero p{font-size:13.5px;color:#c6f0e8;margin-bottom:16px}
  .hero .meter{background:rgba(255,255,255,.18);border-radius:999px;height:10px;overflow:hidden}
  .hero .meter > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#5eead4,#99f6e4)}
  .hero .meter-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px}
  .hero .big{font-size:26px;font-weight:800;color:#fff}
  .hero .small{font-size:12px;color:#bdeee5}

  /* Encabezado de sección */
  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin:4px 2px 12px}
  .sec-head h2{font-size:18px;font-weight:800}
  .sec-head span{font-size:12.5px;color:var(--muted)}

  /* Tarjetas de área */
  .cards{display:grid;gap:13px}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 15px 14px;box-shadow:var(--shadow);
    display:grid;grid-template-columns:auto 1fr auto;gap:13px;align-items:center;
    cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .card:active{transform:scale(.985)}
  .card .ico{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:23px;background:var(--brand-tint)}
  .card .body{min-width:0}
  .card h3{font-size:15.5px;font-weight:700;margin-bottom:3px}
  .card .progress{height:7px;border-radius:999px;background:#eef2f6;overflow:hidden;margin-top:8px}
  .card .progress > i{display:block;height:100%;border-radius:999px}
  .card .meta{display:flex;align-items:center;gap:8px;margin-top:7px;font-size:12px;color:var(--muted)}
  .card .chev{color:#cbd5e1;font-size:20px;flex:none}
  .pct{font-weight:800;font-size:17px;line-height:1;flex:none;text-align:right}

  /* Chip de estado */
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    padding:3px 9px;border-radius:999px;white-space:nowrap}
  .chip .d{width:6px;height:6px;border-radius:50%}
  .chip.progreso{background:var(--warn-tint);color:var(--warn)} .chip.progreso .d{background:var(--warn)}
  .chip.pendiente{background:var(--pend-tint);color:var(--pend)} .chip.pendiente .d{background:var(--pend)}
  .chip.completo{background:var(--ok-tint);color:var(--ok)} .chip.completo .d{background:var(--ok)}

  /* ---- Pantalla de detalle ---- */
  .back{display:inline-flex;align-items:center;gap:7px;background:none;border:0;color:var(--brand-700);
    font-weight:700;font-size:14px;padding:6px 2px;margin-bottom:6px;cursor:pointer}
  .detail-hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px;margin-bottom:16px;display:flex;gap:14px;align-items:center}
  .ring{--p:0;width:74px;height:74px;flex:none;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--brand-600) calc(var(--p)*1%), #e8eef3 0);}
  .ring > div{width:56px;height:56px;border-radius:50%;background:#fff;display:grid;place-items:center;font-weight:800;font-size:17px}
  .detail-hero h2{font-size:19px;font-weight:800;margin-bottom:4px}
  .detail-hero .sub{font-size:13px;color:var(--muted)}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
  .panel > .ph{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

  /* Mini gráfico de barras (sin librerías) */
  .bars{display:flex;align-items:flex-end;gap:14px;height:120px;padding:0 4px}
  .bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
  .bars .bar{width:100%;max-width:46px;border-radius:9px 9px 4px 4px;transition:height .5s ease}
  .bars .lab{font-size:11px;color:var(--muted);font-weight:600}
  .bars .val{font-size:12px;font-weight:800}

  /* Lista de tareas */
  .task{display:flex;align-items:center;gap:12px;padding:12px 2px;border-top:1px solid var(--line)}
  .task:first-child{border-top:0}
  .task .box{width:22px;height:22px;border-radius:7px;border:2px solid #cbd5e1;flex:none;display:grid;place-items:center;font-size:13px;color:#fff}
  .task.done .box{background:var(--ok);border-color:var(--ok)}
  .task.prog .box{border-color:var(--warn);color:var(--warn);background:var(--warn-tint)}
  .task .t{flex:1;font-size:14.5px}
  .task.done .t{color:var(--muted);text-decoration:line-through}
  .task .who{font-size:11.5px;color:var(--muted);background:#f1f5f9;padding:3px 8px;border-radius:999px;white-space:nowrap}

  /* ===== BARRA INFERIOR (lo distintivo de la Opción A) ===== */
  .tabbar{
    position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;z-index:50;
    background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(12px);
    border-top:1px solid var(--line);box-shadow:var(--shadow-bar);
    display:grid;grid-template-columns:repeat(5,1fr);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  .tabbar button{
    background:none;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 2px;border-radius:12px;color:var(--muted);font-size:11px;font-weight:600;
    -webkit-tap-highlight-color:transparent;
  }
  .tabbar button .gl{font-size:21px;line-height:1;filter:grayscale(.2)}
  .tabbar button.active{color:var(--brand-700)}
  .tabbar button.active .gl{filter:none}
  .tabbar button.active .ind{width:18px;height:3px;border-radius:3px;background:var(--brand-600);margin-top:1px}
  .tabbar button .ind{width:0;height:3px;margin-top:1px}

  /* Hoja "Más" */
  .sheet-wrap{position:fixed;inset:0;z-index:60;display:none}
  .sheet-wrap.open{display:block}
  .sheet-wrap .ov{position:absolute;inset:0;background:rgba(15,23,42,.45);animation:fade .25s}
  .sheet{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;
    background:var(--surface);border-radius:22px 22px 0 0;padding:10px 14px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px -10px rgba(15,23,42,.4);animation:slideup .3s ease}
  @keyframes slideup{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
  .sheet .grab{width:42px;height:5px;border-radius:999px;background:#dbe3ea;margin:6px auto 12px}
  .sheet .si{display:flex;align-items:center;gap:13px;padding:13px 8px;border-radius:13px;cursor:pointer;font-weight:600}
  .sheet .si:active{background:#f3f6f9}
  .sheet .si .g{width:40px;height:40px;border-radius:11px;background:var(--brand-tint);display:grid;place-items:center;font-size:20px}
  .sheet .si.danger{color:var(--pend)} .sheet .si.danger .g{background:var(--pend-tint)}
</style>
</head>
<body>
  <div class="ribbon"><span class="dot"></span><b>Opción A</b> · Barra inferior tipo app — vista previa (no es la app real)</div>

  <header class="appbar">
    <div class="brand"><span class="mark">⚕️</span> I&amp;I Realty</div>
    <div class="spacer"></div>
    <div class="avatar">PS</div>
  </header>

  <main id="main"></main>

  <!-- Barra de navegación inferior -->
  <nav class="tabbar" id="tabbar">
    <button data-go="resumen" class="active"><span class="gl">📊</span>Resumen<span class="ind"></span></button>
    <button data-go="financiamiento"><span class="gl">💵</span>Finanzas<span class="ind"></span></button>
    <button data-go="local"><span class="gl">🏢</span>Local<span class="ind"></span></button>
    <button data-go="equipos"><span class="gl">🩺</span>Equipos<span class="ind"></span></button>
    <button data-go="__mas"><span class="gl">☰</span>Más<span class="ind"></span></button>
  </nav>

  <!-- Hoja "Más" -->
  <div class="sheet-wrap" id="sheet">
    <div class="ov" data-close></div>
    <div class="sheet">
      <div class="grab"></div>
      <div class="si" data-go="equipos_oficina"><span class="g">🖥️</span>Equipos de Oficina</div>
      <div class="si" data-go="personal"><span class="g">👥</span>Personal</div>
      <div class="si" data-go="permisos"><span class="g">📋</span>Permisos</div>
      <div class="si" data-go="admin"><span class="g">⚙️</span>Admin</div>
      <div class="si danger" data-close><span class="g">🚪</span>Cerrar sesión</div>
    </div>
  </div>

<script>
/* ---- Datos de ejemplo (representan tus áreas reales) ---- */
const AREAS = [
  {id:'financiamiento',  name:'Financiamiento',     icon:'💵', pct:72, done:8, total:11, status:'progreso'},
  {id:'local',           name:'Local / Oficina',    icon:'🏢', pct:45, done:5, total:11, status:'progreso'},
  {id:'equipos',         name:'Equipos Médicos',    icon:'🩺', pct:30, done:3, total:10, status:'progreso'},
  {id:'equipos_oficina', name:'Equipos de Oficina', icon:'🖥️', pct:60, done:6, total:10, status:'progreso'},
  {id:'personal',        name:'Personal',           icon:'👥', pct:20, done:2, total:10, status:'pendiente'},
  {id:'permisos',        name:'Permisos',           icon:'📋', pct:15, done:1, total:7,  status:'pendiente'},
];
const STATUS_LABEL = {progreso:'En progreso', pendiente:'Pendiente', completo:'Completo'};
const BARCOLOR = {progreso:'var(--warn)', pendiente:'var(--pend)', completo:'var(--ok)'};
const TASKS = [
  {t:'Cotizar y comparar suplidores', who:'Pedro', st:'done'},
  {t:'Negociar términos de pago',     who:'Ana',   st:'prog'},
  {t:'Reservar fecha de entrega',     who:'—',     st:'todo'},
  {t:'Validar garantía y servicio',   who:'—',     st:'todo'},
  {t:'Coordinar instalación',         who:'Luis',  st:'todo'},
];

const overall = Math.round(AREAS.reduce((a,b)=>a+b.pct,0)/AREAS.length);

function resumenHTML(){
  return `
  <section class="screen">
    <div class="hero">
      <div class="eyebrow">Centro de control</div>
      <h1>Clínica de Endocrinología · Santurce</h1>
      <p>Seguimiento de apertura: financiamiento, local, equipos, personal y permisos.</p>
      <div class="meter"><i style="width:${overall}%"></i></div>
      <div class="meter-row"><span class="big">${overall}%</span><span class="small">avance general del proyecto</span></div>
    </div>
    <div class="sec-head"><h2>Áreas del proyecto</h2><span>Toca para abrir</span></div>
    <div class="cards">
      ${AREAS.map(a=>`
        <div class="card" data-go="${a.id}">
          <div class="ico">${a.icon}</div>
          <div class="body">
            <h3>${a.name}</h3>
            <div class="meta"><span class="chip ${a.status}"><span class="d"></span>${STATUS_LABEL[a.status]}</span><span>${a.done}/${a.total} tareas</span></div>
            <div class="progress"><i style="width:${a.pct}%;background:${BARCOLOR[a.status]}"></i></div>
          </div>
          <div class="pct" style="color:${BARCOLOR[a.status]}">${a.pct}%</div>
        </div>`).join('')}
    </div>
  </section>`;
}

function detalleHTML(id){
  const a = AREAS.find(x=>x.id===id) || {name:'Área',pct:40,done:3,total:8,status:'progreso',icon:'📁'};
  const done = TASKS.filter(t=>t.st==='done').length;
  const prog = TASKS.filter(t=>t.st==='prog').length;
  const todo = TASKS.filter(t=>t.st==='todo').length;
  const mx = Math.max(done,prog,todo,1);
  return `
  <section class="screen">
    <button class="back" data-go="resumen">‹ Volver al resumen</button>
    <div class="detail-hero">
      <div class="ring" style="--p:${a.pct}"><div>${a.pct}%</div></div>
      <div>
        <h2>${a.icon} ${a.name}</h2>
        <div class="sub">${a.done} de ${a.total} tareas completadas · <span class="chip ${a.status}" style="vertical-align:middle"><span class="d"></span>${STATUS_LABEL[a.status]}</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">Tareas por estado</div>
      <div class="bars">
        <div class="col"><div class="val" style="color:var(--ok)">${done}</div><div class="bar" style="height:${done/mx*100}%;background:linear-gradient(180deg,#34d399,#059669)"></div><div class="lab">Hechas</div></div>
        <div class="col"><div class="val" style="color:var(--warn)">${prog}</div><div class="bar" style="height:${prog/mx*100}%;background:linear-gradient(180deg,#fbbf24,#b45309)"></div><div class="lab">En curso</div></div>
        <div class="col"><div class="val" style="color:var(--pend)">${todo}</div><div class="bar" style="height:${todo/mx*100}%;background:linear-gradient(180deg,#fb7185,#be123c)"></div><div class="lab">Pendientes</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">Lista de tareas</div>
      ${TASKS.map(t=>`
        <div class="task ${t.st==='done'?'done':t.st==='prog'?'prog':''}">
          <div class="box">${t.st==='done'?'✓':t.st==='prog'?'•':''}</div>
          <div class="t">${t.t}</div>
          <div class="who">${t.who}</div>
        </div>`).join('')}
    </div>
  </section>`;
}

function go(id){
  const main = document.getElementById('main');
  if(id==='__mas'){ document.getElementById('sheet').classList.add('open'); return; }
  document.getElementById('sheet').classList.remove('open');
  main.innerHTML = (id==='resumen') ? resumenHTML() : detalleHTML(id);
  window.scrollTo({top:0});
  // marcar activo en la barra inferior
  const map = {resumen:'resumen',financiamiento:'financiamiento',local:'local',equipos:'equipos'};
  document.querySelectorAll('.tabbar button').forEach(b=>{
    const g=b.dataset.go;
    b.classList.toggle('active', g===id || (g==='__mas' && !map[id] && id!=='resumen'));
  });
}

document.addEventListener('click', e=>{
  const goEl = e.target.closest('[data-go]');
  const closeEl = e.target.closest('[data-close]');
  if(goEl){ go(goEl.dataset.go); }
  else if(closeEl){ document.getElementById('sheet').classList.remove('open'); }
});

go('resumen');
</script>
</body>
</html>
